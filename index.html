<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLACKBIRD // WHITE-OUT.V2</title>
    <style>
        /* 2006 CLASSIC "CLEAN" AESTHETIC */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Tahoma", sans-serif;
            margin: 0; padding: 0;
            border: 10px solid #cccccc;
            height: 97vh;
        }

        .header {
            background-color: #0055aa;
            color: white;
            padding: 8px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 3px solid #000;
            text-align: left;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100% - 40px);
        }

        /* SIDEBAR: SOUNDBOARD */
        .soundboard {
            border-right: 2px solid #000;
            background: #f0f0f0;
            padding: 10px;
            overflow-y: auto;
        }

        .instant-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            background: #e1e1e1;
            border: 2px outset #fff;
            cursor: pointer;
            font-weight: bold;
            text-align: left;
        }

        .instant-btn:active { border: 2px inset #fff; }

        /* VIEWPORT */
        .viewport-area {
            display: flex;
            flex-direction: column;
            padding: 10px;
            background: #fff;
        }

        #display-box {
            flex: 1;
            border: 2px solid #000;
            background: #eee;
            margin-bottom: 10px;
            overflow: auto;
            padding: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input, textarea {
            border: 2px solid #000;
            padding: 5px;
            font-family: monospace;
        }

        button {
            background: #0055aa;
            color: white;
            border: 2px outset #fff;
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">SYSTEM_OPERATOR: sakurraaaaaa // NODE: 326306</div>

    <div class="main-layout">
        <div class="soundboard">
            <h3 style="margin-top:0;">SOUND_EXPANSION</h3>
            <button class="instant-btn" onclick="playSound('https://www.myinstants.com/media/sounds/discord-notification.mp3')">🔊 DISCORD_NOTIF</button>
            <button class="instant-btn" onclick="playSound('https://www.myinstants.com/media/sounds/taco-bell-bong.mp3')">🔊 TACO_BELL</button>
            <button class="instant-btn" onclick="playSound('https://www.myinstants.com/media/sounds/vine-boom.mp3')">🔊 VINE_BOOM</button>
            <button class="instant-btn" onclick="playSound('https://www.myinstants.com/media/sounds/emotional-damage-meme.mp3')">🔊 EMOTIONAL_DMG</button>
            <p style="font-size: 10px;">[!] Links fetched from myinstants.com</p>
        </div>

        <div class="viewport-area">
            <div id="display-box">
                <p>> Waiting for payload execution...</p>
            </div>

            <div class="controls">
                <textarea id="code-in" style="flex:1; height: 60px;" placeholder="Paste HTML/CSS here..."></textarea>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <input type="text" id="url-in" placeholder="Enter .png or .txt URL">
                    <button onclick="executeCode()">SHRED_EXECUTE</button>
                    <button onclick="loadMedia()">LOAD_MEDIA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function playSound(url) {
            let audio = new Audio(url);
            audio.play();
        }

        function executeCode() {
            const code = document.getElementById('code-in').value;
            const display = document.getElementById('display-box');
            display.innerHTML = code; // Directly injects your HTML/CSS into the screen
        }

        function loadMedia() {
            const url = document.getElementById('url-in').value;
            const display = document.getElementById('display-box');
            // If it's a raw URL, we show it as a link since IFRAMES are blocked by schools
            display.innerHTML = `<h3>EXTERNAL LINK READY:</h3><a href="${url}" target="_blank">${url}</a><br><p>Browsers block internal loading for security. Click to open in new node.</p>`;
        }
    </script>
</body>
</html>
