<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Classroom</title> <style>
        :root { --win-grey: #dfdfdf; --win-blue: #0055aa; }
        body { background: #557db5; font-family: "Tahoma", sans-serif; margin: 0; overflow: hidden; }

        /* PANIC MODE UI */
        #panic-screen { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; z-index: 99999; 
        }

        /* MAIN UI */
        .window { 
            width: 95vw; height: 90vh; margin: 20px auto; background: var(--win-grey); 
            border: 3px outset #fff; box-shadow: 5px 5px 0 #000; display: flex; flex-direction: column;
        }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; }
        
        /* THE BUTTON GRID */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 5px; padding: 15px; overflow-y: auto; flex: 1; background: #fff; border: 2px inset #000;
        }
        .sound-btn { 
            background: #eee; border: 2px outset #fff; font-size: 11px; padding: 10px 2px; 
            text-align: center; cursor: pointer; font-weight: bold;
        }
        .sound-btn:hover { background: #ddd; }

        /* CONFIRMATION POPUP */
        #confirm-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: var(--win-grey); border: 4px solid #000; z-index: 10000; padding: 20px;
            text-align: center; box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
        }

        /* SECRET SETTINGS */
        #secret-ui {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #0f0; z-index: 20000; padding: 50px;
        }
    </style>
</head>
<body>

<div id="panic-screen">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_logo.svg" width="100" style="margin: 50px;">
    <h1 style="font-family: Arial; color: #5f6368; margin-left: 50px;">Classes</h1>
    <hr>
</div>

<div class="window">
    <div class="title-bar">
        <span>🦅 BLACKBIRD_SHREDDER_v5 // BYPASS_ACTIVE</span>
        <span>[ ESC to PANIC ]</span>
    </div>
    
    <div class="grid" id="mainGrid">
        </div>
</div>

<div id="confirm-box">
    <p id="confirm-text">do u rlly want to play the sound or no? - brayden</p>
    <button onclick="playSoundNow()" style="background: #00aa00; color: white; padding: 10px 20px;">YES</button>
    <button onclick="cancelSound()" style="background: #aa0000; color: white; padding: 10px 20px;">NO</button>
</div>

<div id="secret-ui">
    <h1>AAAAAADVANCCED SETTINGS BY BRAYDEN:</h1>
    <p class="badge">BADGE AWARDED! BROS TUFF AT TYPING 11</p>
    <hr>
    <h3>AUDIO MODS:</h3>
    Pitch: <input type="range" id="pitch" min="0.1" max="2" step="0.1" value="1"><br>
    Volume Limit: <input type="range" id="vol" min="0" max="1" step="0.1" value="0.5"><br>
    <br>
    <button onclick="window.open('https://www.google.com/search?q=unblocked+games')">🚀 SECRET UNBLOCKED HUB</button>
    <br><br>
    <button onclick="document.getElementById('secret-ui').style.display='none'">EXIT SETTINGS</button>
</div>

<script>
    let pendingSound = "";
    const soundList = [
        {n: "TACO BELL", u: "https://www.myinstants.com/media/sounds/taco-bell-bong.mp3"},
        {n: "POU EST", u: "https://www.myinstants.com/media/sounds/pou-estourado.mp3"},
        {n: "VINE BOOM", u: "https://www.myinstants.com/media/sounds/vine-boom.mp3"},
        {n: "FBI OPEN", u: "https://www.myinstants.com/media/sounds/fbi-open-up-sfx.mp3"}
    ];

    // Load 150 buttons
    const grid = document.getElementById('mainGrid');
    for(let i=0; i<150; i++){
        let s = soundList[i % soundList.length];
        let b = document.createElement('div');
        b.className = 'sound-btn';
        b.innerHTML = `[${i+1}]<br>${s.n}`;
        b.onclick = () => confirmSound(s.u);
        grid.appendChild(b);
    }

    function confirmSound(url) {
        pendingSound = url;
        document.getElementById('confirm-box').style.display = 'block';
    }

    function playSoundNow() {
        alert("okay");
        let a = new Audio(pendingSound);
        a.playbackRate = document.getElementById('pitch').value;
        a.volume = document.getElementById('vol').value;
        a.play();
        document.getElementById('confirm-box').style.display = 'none';
    }

    function cancelSound() {
        document.getElementById('confirm-box').style.display = 'none';
        // Hide the whole UI briefly to "disappear"
        document.querySelector('.window').style.opacity = '0';
        setTimeout(() => { document.querySelector('.window').style.opacity = '1'; }, 1000);
    }

    // SECRET '11' TRIGGER
    let keys = "";
    window.onkeydown = (e) => {
        if(e.key === "Escape") { 
            document.getElementById('panic-screen').style.display = 'block';
        }
        keys += e.key;
        if(keys.endsWith("11")) {
            document.getElementById('secret-ui').style.display = 'block';
            keys = "";
        }
    };
</script>
</body>
</html>
